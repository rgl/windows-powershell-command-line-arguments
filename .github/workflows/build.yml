name: build
on:
  push:
  workflow_dispatch:
jobs:
  test:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser
          Get-Module -Name Pester -ListAvailable
      - name: Test
        shell: powershell
        run: |
          Import-Module Pester -Version 5.7.1
          $result = Invoke-Pester `
            -PassThru `
            -CI `
            -Output Detailed
          if ($result.FailedCount) {
            Write-Error "Tests failed: $($result.FailedCount) failures"
            Exit 1
          }
