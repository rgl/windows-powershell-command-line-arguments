name: build
on:
  push:
  workflow_dispatch:
jobs:
  test:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser
          Get-Module -Name Pester -ListAvailable
      - name: Test
        shell: powershell
        run: |
          Import-Module Pester -Version 5.7.1
          $result = Invoke-Pester `
            -Configuration (New-PesterConfiguration @{
              Run = @{
                PassThru = $true
                Exit = $true
              }
              Output = @{
                Verbosity = 'Detailed'
              }
              TestResult = @{
                Enabled = $true
                OutputFormat = 'NUnit3'
                OutputPath = 'testResults.xml'
              }
            })
          if ($result.FailedCount) {
            Write-Error "Tests failed: $($result.FailedCount) failures"
            Exit 1
          }
      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Tests
          path: testResults.xml
          reporter: dotnet-nunit
